server {
    server_name blog.samay15jan.com;

    location / {
        return 301 https://mirrorverse.samay15jan.com/share/-azPB0Chr9jSMthi;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/blog.samay15jan.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/blog.samay15jan.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = blog.samay15jan.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name blog.samay15jan.com;
    return 404; # managed by Certbot


}
